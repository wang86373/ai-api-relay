<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin - USDT Payments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      margin-top: 8px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid #334155;
      padding: 10px;
      text-align: left;
      word-break: break-all;
    }

    th {
      color: #93c5fd;
    }

    .pending {
      color: #facc15;
      font-weight: bold;
    }

    .confirmed {
      color: #22c55e;
      font-weight: bold;
    }

    .msg {
      margin-top: 12px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>USDT Payment Admin</h1>
      <p>Enter your ADMIN_SECRET to manage USDT payment requests.</p>

      <input id="adminKey" placeholder="ADMIN_SECRET" />
      <button onclick="loadPayments()">Load Payments</button>

      <div class="msg" id="msg"></div>
    </div>

    <div class="card">
      <h2>API Keys</h2>
      <button onclick="loadKeys()">Load API Keys</button>
      <div id="keysBox">No keys loaded.</div>
    </div>

    <div class="card">
      <h2>Payment Requests</h2>
      <div id="paymentsBox">No data loaded.</div>
    </div>

  </div>

  <script>
    const API_BASE = "https://ai-api-relay.onrender.com";

    function getAdminKey() {
      return document.getElementById("adminKey").value.trim();
    }

    async function loadKeys() {
      const box = document.getElementById("keysBox");

      box.innerHTML = "Loading...";

      try {
        const res = await fetch(
          API_BASE + "/admin/keys",
          {
            headers: {
              "x-admin-key": getAdminKey()
            }
          }
        );

        const data = await res.json();

        if (!res.ok) {
          box.innerHTML = data.error?.message || "Failed";
          return;
        }

        if (!data.keys || data.keys.length === 0) {
          box.innerHTML = "No API keys";
          return;
        }

        box.innerHTML = data.keys.map(k => `
      <div style="
        padding:12px;
        margin-bottom:12px;
        border:1px solid rgba(255,255,255,0.08);
        border-radius:12px;
      ">
        <div><b>Email:</b> ${k.email}</div>
        <div><b>Balance:</b> $${k.balance}</div>
        <div><b>API Key:</b> ${k.api_key}</div>
        <div><b>Active:</b> ${k.is_active}</div>
        <div><b>Total Requests:</b> ${k.total_requests || 0}</div>

<div><b>Total Tokens:</b> ${k.total_tokens || 0}</div>

<div><b>Total Cost:</b> $${Number(k.total_cost || 0).toFixed(4)}</div>
<div>
  <b>Last Used:</b>
  ${k.last_used_at
    ? new Date(k.last_used_at).toLocaleString()
    : "Never"}
</div>

<button onclick="toggleKey(${k.id}, ${!k.is_active})">
  ${k.is_active ? "Disable" : "Enable"}
</button>
<button onclick="rechargeKey('${k.api_key}')">
  Recharge
</button>
      </div>
    `).join("");

      } catch (err) {
        box.innerHTML = err.message;
      }
    }

    async function toggleKey(keyId, isActive) {
      const ok = confirm(
        isActive
          ? "Enable this API key?"
          : "Disable this API key?"
      );

      if (!ok) return;

      const res = await fetch(API_BASE + "/admin/toggle-key", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": getAdminKey()
        },
        body: JSON.stringify({
          key_id: keyId,
          is_active: isActive
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error?.message || "Failed");
        return;
      }

      alert("Updated.");
      loadKeys();
    }

    async function rechargeKey(apiKey) {
      const amount = prompt("Recharge amount:");

      if (!amount) return;

      const res = await fetch(API_BASE + "/admin/recharge", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": getAdminKey()
        },
        body: JSON.stringify({
          api_key: apiKey,
          amount: Number(amount)
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error?.message || "Recharge failed");
        return;
      }

      alert("Balance updated.");
      loadKeys();
    }

    async function loadPayments() {
      const msg = document.getElementById("msg");
      const box = document.getElementById("paymentsBox");

      msg.innerText = "Loading...";

      try {
        const res = await fetch(API_BASE + "/admin/usdt-payments", {
          method: "GET",
          headers: {
            "x-admin-key": getAdminKey()
          }
        });

        const data = await res.json();

        if (!res.ok) {
          msg.innerText = data.error?.message || "Failed to load payments";
          return;
        }

        msg.innerText = "Loaded.";

        if (!data.payments || data.payments.length === 0) {
          box.innerHTML = "No payment requests.";
          return;
        }

        box.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>API Key</th>
                <th>Amount</th>
                <th>Tx Hash</th>
                <th>Status</th>
                <th>Created</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${data.payments.map(p => `
                <tr>
                  <td>${p.id}</td>
                  <td>${p.api_key}</td>
                  <td>${p.amount}</td>
                  <td>${p.tx_hash || ""}</td>
                  <td class="${p.status}">${p.status}</td>
                  <td>${new Date(p.created_at).toLocaleString()}</td>
                  <td>
                    ${p.status === "confirmed"
            ? "Confirmed"
            : `<button onclick="confirmPayment(${p.id})">Confirm</button>`
          }
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;

      } catch (err) {
        msg.innerText = err.message;
      }
    }

    async function confirmPayment(paymentId) {
      const ok = confirm("Confirm this USDT payment?");
      if (!ok) return;

      const msg = document.getElementById("msg");
      msg.innerText = "Confirming...";

      try {
        const res = await fetch(API_BASE + "/admin/confirm-usdt", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": getAdminKey()
          },
          body: JSON.stringify({
            payment_id: paymentId
          })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.innerText = data.error?.message || "Confirm failed";
          return;
        }

        msg.innerText = "Confirmed. New balance: $" + Number(data.balance || 0).toFixed(4);
        loadPayments();

      } catch (err) {
        msg.innerText = err.message;
      }
    }
  </script>
</body>

</html>
