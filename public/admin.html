<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin - USDT Payments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      margin-top: 8px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid #334155;
      padding: 10px;
      text-align: left;
      word-break: break-all;
    }

    th {
      color: #93c5fd;
    }

    .pending {
      color: #facc15;
      font-weight: bold;
    }

    .confirmed {
      color: #22c55e;
      font-weight: bold;
    }

    .msg {
      margin-top: 12px;
      color: #cbd5e1;
    }

    .sidebar-btn {
      width: 100%;
      text-align: left;
      margin-bottom: 10px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .item {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      transition: 0.2s;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: #2563eb;
    }

    .item h2 {
      margin: 10px 0 0;
      font-size: 30px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="loginPage" class="container">
    <div class="card">
      <h1>Admin Login</h1>
      <p>Enter ADMIN_SECRET to access admin dashboard.</p>

      <input id="loginAdminKey" placeholder="ADMIN_SECRET" type="password" />

      <button onclick="adminLogin()">
        Login
      </button>

      <div class="msg" id="loginMsg"></div>
    </div>
  </div>

  <div id="adminPage" style="display:none;">

    <div style="
  display:flex;
  height:100vh;
  overflow:hidden;
">

      <aside style="
      width:240px;
      background:#020617;
      border-right:1px solid rgba(255,255,255,0.08);
      padding:24px;
      position:sticky;
      top:0;
      height:100vh;
    ">
        <h2>AI API Relay</h2>

        <button class="sidebar-btn" onclick="showAdminSection('overviewSection', this)">
          Overview
        </button>

        <button class="sidebar-btn" onclick="showAdminSection('keysSection', this)">
          API Keys
        </button>

        <button class="sidebar-btn" onclick="showAdminSection('logsSection', this)">
          Usage Logs
        </button>

        <button class="sidebar-btn" onclick="showAdminSection('statsSection', this)">
          Stats
        </button>

        <button class="sidebar-btn" onclick="showAdminSection('paymentsSection', this)">
          Payments
        </button>

        <button onclick="adminLogout()" class="danger">
          Logout
        </button>
      </aside>

      <main style="
  flex:1;
  overflow-y:auto;
  padding:40px;
  max-width:none;
">

        <div class="card admin-section" id="overviewSection">
          <h2>Admin Overview</h2>
          <div id="overviewBox">
            Click Load API Keys to view overview.
          </div>
        </div>

        <div class="card admin-section" id="keysSection">
          <h2>API Keys</h2>
          <input id="searchInput" placeholder="Search email / api key / key name" />

          <button onclick="searchKeys()">
            Search
          </button>
          <button onclick="loadKeys()">Load API Keys</button>
          <div id="keysBox">No keys loaded.</div>
        </div>
        <div class="card admin-section" id="logsSection">
          <h2>Usage Logs</h2>

          <div id="logsBox">
            Please select an API Key from API Keys → View Logs
          </div>
        </div>
    </div>
    <div class="card admin-section" id="statsSection">

      <h2>Realtime Stats</h2>

      <canvas id="statsChart" height="120"></canvas>

    </div>
    <div class="card admin-section" id="paymentsSection">
      <h2>Payment Requests</h2>
      <select id="paymentStatusFilter" onchange="loadPayments()">
        <option value="all">All Payments</option>
        <option value="pending">Pending Only</option>
        <option value="confirmed">Confirmed Only</option>
      </select>
      <input id="adminKey" placeholder="ADMIN_SECRET" style="display:none;" />

      <div class="msg" id="msg"></div>
      <div id="paymentsBox">No data loaded.</div>
    </div>

    </main>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const API_BASE = "https://ai-api-relay.onrender.com";
    let statsChart;
    function showAdminSection(sectionId, btn) {

      document.querySelectorAll(".admin-section")
        .forEach(el => {
          el.style.display = "none";
        });

      document.getElementById(sectionId)
        .style.display = "block";

      document.querySelectorAll(".sidebar-btn")
        .forEach(el => {
          el.style.background = "transparent";
          el.style.borderColor = "rgba(255,255,255,0.08)";
        });

      if (btn) {
        btn.style.background = "#2563eb";
        btn.style.borderColor = "#2563eb";
      }
    }

    async function adminLogin() {

      const key =
        document.getElementById("loginAdminKey")
          .value
          .trim();

      if (!key) {
        document.getElementById("loginMsg").innerText =
          "Enter ADMIN_SECRET";

        return;
      }

      try {

        const res = await fetch(
          API_BASE + "/admin/verify",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-key": key
            }
          }
        );

        const data = await res.json();

        if (!res.ok) {

          document.getElementById("loginMsg").innerText =
            data.error?.message || "Invalid ADMIN_SECRET";

          return;
        }

        localStorage.setItem("admin_key", key);

        document.getElementById("adminKey").value =
          key;

        document.getElementById("loginPage").style.display =
          "none";

        document.getElementById("adminPage").style.display =
          "block";
        showAdminSection(
          "overviewSection",
          document.querySelector(".sidebar-btn")
        );

      } catch (err) {

        document.getElementById("loginMsg").innerText =
          "Login failed";
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    function adminLogout() {
      localStorage.removeItem("admin_key");

      document.getElementById("adminPage").style.display =
        "none";

      document.getElementById("loginPage").style.display =
        "block";

      document.getElementById("adminKey").value = "";
      document.getElementById("loginAdminKey").value = "";
    }

    function getAdminKey() {
      return localStorage.getItem("admin_key") || "";
    }

    let latestKeys = [];
    let latestPayments = [];
    let currentKeyPage = 1;
    const keysPerPage = 10;

    function renderOverview() {
      const users = new Set(
        latestKeys
          .map(k => k.user_email)
          .filter(Boolean)
      );

      const totalKeys = latestKeys.length;

      const activeKeys = latestKeys.filter(k => k.is_active).length;

      const totalBalance = latestKeys.reduce((sum, k) => {
        return sum + Number(k.balance || 0);
      }, 0);

      const totalRequests = latestKeys.reduce((sum, k) => {
        return sum + Number(k.total_requests || 0);
      }, 0);

      const totalTokens = latestKeys.reduce((sum, k) => {
        return sum + Number(k.total_tokens || 0);
      }, 0);

      const totalCost = latestKeys.reduce((sum, k) => {
        return sum + Number(k.total_cost || 0);
      }, 0);

      const pendingUsdt = latestPayments.filter(p => {
        return p.status !== "confirmed";
      }).length;

      document.getElementById("overviewBox").innerHTML = `
  <div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin-top:16px;
  ">

    <div class="item">
      <div class="muted">Total Users</div>
      <h2>${users.size}</h2>
    </div>

    <div class="item">
      <div class="muted">API Keys</div>
      <h2>${totalKeys}</h2>
    </div>

    <div class="item">
      <div class="muted">Active Keys</div>
      <h2>${activeKeys}</h2>
    </div>

    <div class="item">
      <div class="muted">Total Balance</div>
      <h2>$${totalBalance.toFixed(4)}</h2>
    </div>

    <div class="item">
      <div class="muted">Requests</div>
      <h2>${totalRequests}</h2>
    </div>

    <div class="item">
      <div class="muted">Tokens</div>
      <h2>${totalTokens}</h2>
    </div>

    <div class="item">
      <div class="muted">Total Cost</div>
      <h2>$${totalCost.toFixed(4)}</h2>
    </div>

    <div class="item">
      <div class="muted">Pending USDT</div>
      <h2>${pendingUsdt}</h2>
    </div>

  </div>
`;
    }

    function prevKeyPage() {
      if (currentKeyPage > 1) {
        currentKeyPage--;
        loadKeys();
      }
    }

    function nextKeyPage(totalPages) {
      if (currentKeyPage < totalPages) {
        currentKeyPage++;
        loadKeys();
      }
    }

    function searchKeys() {
      loadKeys();
    }

    async function loadKeys() {
      const box = document.getElementById("keysBox");
      const keyword =
        document.getElementById("searchInput")
          ?.value
          ?.trim()
          ?.toLowerCase() || "";

      box.innerHTML = "Loading...";

      try {
        const res = await fetch(
          API_BASE + "/admin/keys",
          {
            headers: {
              "x-admin-key": getAdminKey()
            }
          }
        );

        const data = await res.json();

        if (!res.ok) {
          box.innerHTML = data.error?.message || "Failed";
          return;
        }
        if (keyword) {
          data.keys = data.keys.filter(k =>
            (k.user_email || "").toLowerCase().includes(keyword) ||
            (k.api_key || "").toLowerCase().includes(keyword) ||
            (k.key_name || "").toLowerCase().includes(keyword)
          );
        }

        latestKeys = data.keys || [];
        renderOverview();
        if (!data.keys || data.keys.length === 0) {
          box.innerHTML = "No API keys";
          return;
        }

        const totalPages = Math.ceil(data.keys.length / keysPerPage);
        const startIndex = (currentKeyPage - 1) * keysPerPage;
        const pagedKeys = data.keys.slice(startIndex, startIndex + keysPerPage);
        box.innerHTML = pagedKeys.map(k => `
      <div style="
        padding:12px;
        margin-bottom:12px;
        border:1px solid rgba(255,255,255,0.08);
        border-radius:12px;
      ">
        <div style="
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  margin-top:10px;
">

  <div>
    <div class="muted">Name</div>
    <b>${k.key_name || "My API Key"}</b>
  </div>

  <div>
    <div class="muted">Email</div>
    <b>${k.user_email || "-"}</b>
  </div>

  <div>
    <div class="muted">Balance</div>
    <b>$${Number(k.balance || 0).toFixed(4)}</b>
  </div>

  <div>
    <div class="muted">API Key</div>
    <b>
      ${k.api_key.slice(0, 8)}...
      ${k.api_key.slice(-6)}
    </b>
  </div>

  <div>
    <div class="muted">Requests</div>
    <b>${k.total_requests || 0}</b>
  </div>

  <div>
    <div class="muted">Tokens</div>
    <b>${k.total_tokens || 0}</b>
  </div>

  <div>
    <div class="muted">Total Cost</div>
    <b>$${Number(k.total_cost || 0).toFixed(4)}</b>
  </div>

  <div>
    <div class="muted">Last Used</div>
    <b>
${k.last_used_at
            ? new Date(k.last_used_at).toLocaleString()
            : "Never"}
</b>
  </div>

</div>

<button onclick="toggleKey(${k.id}, ${!k.is_active})">
  ${k.is_active ? "Disable" : "Enable"}
</button>
<button onclick="rechargeKey('${k.api_key}')">
  Recharge
</button>
<button onclick="loadLogs('${k.api_key}')">
  View Logs
</button>
<button onclick="deleteKey('${k.api_key}')">
  Delete
</button>
      </div>
    `).join("") + `
  <div style="margin-top:20px;">
    <button onclick="prevKeyPage()">Previous</button>

    <span style="margin:0 12px;">
      Page ${currentKeyPage} / ${totalPages}
    </span>

    <button onclick="nextKeyPage(${totalPages})">
      Next
    </button>
  </div>
`;

      } catch (err) {
        box.innerHTML = err.message;
      }
    }

    async function deleteKey(apiKey) {

      const ok = confirm(
        "Delete this API key permanently?"
      );

      if (!ok) return;

      try {

        const res = await fetch(
          API_BASE + "/admin/delete-key",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-key": getAdminKey()
            },
            body: JSON.stringify({
              api_key: apiKey
            })
          }
        );

        const data = await res.json();

        if (!res.ok) {
          alert(data.error?.message || "Delete failed");
          return;
        }

        alert("API key deleted");

        loadKeys();

      } catch (err) {
        alert(err.message);
      }
    }

    async function loadLogs(apiKey) {
      showAdminSection("logsSection");
      const box = document.getElementById("logsBox");

      box.innerHTML = "Loading logs...";

      try {

        const res = await fetch(
          API_BASE + "/logs/" + apiKey
          , {
            headers: {
              "x-admin-key": getAdminKey()
            }
          });

        const data = await res.json();

        if (!res.ok) {
          box.innerHTML = data.error?.message || "Failed";
          return;
        }

        if (!data.logs || data.logs.length === 0) {
          box.innerHTML = "No logs found.";
          return;
        }

        box.innerHTML = data.logs.map(log => `
      <div style="
  padding:14px 16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  font-size:14px;
">
        <div><b>Model:</b> ${log.model}</div>
        <div><b>Total Tokens:</b> ${log.total_tokens || 0}</div>
        <div><b>Cost:</b> $${Number(log.cost || 0).toFixed(4)}</div>
        <div><b>Time:</b> ${new Date(log.created_at).toLocaleString()}</div>
      </div>
    `).join("");

      } catch (err) {
        box.innerHTML = err.message;
      }
    }

    async function toggleKey(keyId, isActive) {
      const ok = confirm(
        isActive
          ? "Enable this API key?"
          : "Disable this API key?"
      );

      if (!ok) return;

      const res = await fetch(API_BASE + "/admin/toggle-key", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": getAdminKey()
        },
        body: JSON.stringify({
          key_id: keyId,
          is_active: isActive
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error?.message || "Failed");
        return;
      }

      alert("Updated.");
      loadKeys();
    }

    async function loadRealtimeStats() {
      try {

        const res = await fetch(API_BASE + "/admin/stats");
        const data = await res.json();

        if (!res.ok) return;

        const ctx =
          document.getElementById("statsChart");

        if (statsChart) {
          statsChart.destroy();
        }

        statsChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: data.labels,
            datasets: [
              {
                label: "Requests",
                data: data.requests,
                borderColor: "#4f46e5",
                backgroundColor: "rgba(79,70,229,0.15)",
                tension: 0.35,
                fill: true
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                labels: {
                  color: "white"
                }
              }
            },
            scales: {
              x: {
                ticks: {
                  color: "white"
                }
              },
              y: {
                ticks: {
                  color: "white"
                }
              }
            }
          }
        });

      } catch (err) {
        console.error(err);
      }
    }

    async function rechargeKey(apiKey) {
      const amount = prompt("Recharge amount:");

      if (!amount) return;

      const res = await fetch(API_BASE + "/admin/recharge", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": getAdminKey()
        },
        body: JSON.stringify({
          api_key: apiKey,
          amount: Number(amount)
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error?.message || "Recharge failed");
        return;
      }

      alert("Balance updated.");
      loadKeys();
    }

    async function loadPayments() {
      const msg = document.getElementById("msg");
      const box = document.getElementById("paymentsBox");

      msg.innerText = "Loading...";

      try {
        const res = await fetch(API_BASE + "/admin/usdt-payments", {
          method: "GET",
          headers: {
            "x-admin-key": getAdminKey()
          }
        });

        const data = await res.json();

        if (!res.ok) {
          msg.innerText = data.error?.message || "Failed to load payments";
          return;
        }

        const statusFilter =
          document.getElementById("paymentStatusFilter")?.value || "all";

        if (statusFilter !== "all") {
          data.payments = data.payments.filter(p => p.status === statusFilter);
        }

        msg.innerText = "Loaded.";
        latestPayments = data.payments || [];
        renderOverview();

        if (!data.payments || data.payments.length === 0) {
          box.innerHTML = "No payment requests.";
          return;
        }

        box.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>API Key</th>
                <th>Amount</th>
                <th>Tx Hash</th>
                <th>Status</th>
                <th>Created</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${data.payments.map(p => `
                <tr>
                  <td>${p.id}</td>
                  <td>${p.api_key}</td>
                  <td>${p.amount}</td>
                  <td>
  ${p.tx_hash || ""}
  <button onclick="copyText('${p.tx_hash || ""}')">
    Copy
  </button>
</td>
                  <td class="${p.status}">${p.status}</td>
                  <td>${new Date(p.created_at).toLocaleString()}</td>
                  <td>
                    ${p.status === "confirmed"
            ? "Confirmed"
            : `<button onclick="confirmPayment(${p.id})">Confirm</button>`
          }
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;

      } catch (err) {
        msg.innerText = err.message;
      }
    }

    async function confirmPayment(paymentId) {
      showAdminSection("paymentsSection");
      const ok = confirm("Confirm this USDT payment?");
      if (!ok) return;

      const msg = document.getElementById("msg");
      msg.innerText = "Confirming...";

      try {
        const res = await fetch(API_BASE + "/admin/confirm-usdt", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": getAdminKey()
          },
          body: JSON.stringify({
            payment_id: paymentId
          })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.innerText = data.error?.message || "Confirm failed";
          return;
        }

        msg.innerText = "Confirmed. New balance: $" + Number(data.balance || 0).toFixed(4);
        loadPayments();

      } catch (err) {
        msg.innerText = err.message;
      }
    }

    const savedAdminKey =
      localStorage.getItem("admin_key");

    if (savedAdminKey) {

      document.getElementById("adminPage").style.display =
        "block";
      showAdminSection(
        "overviewSection",
        document.querySelector(".sidebar-btn")
      );

      loadKeys();
      loadPayments();
      loadRealtimeStats();

      setInterval(loadRealtimeStats, 30000);

      document.getElementById("loginPage").style.display =
        "none";

      document.getElementById("adminKey").value =
        savedAdminKey;

    }
  </script>
</body>

</html>
