<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - AI API Relay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111827;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #94a3b8;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .msg {
      margin-top: 16px;
      font-size: 14px;
      color: #cbd5e1;
      word-break: break-word;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Create your API key</h1>
    <p>Enter your email to create your AI API Relay account and receive a free starting balance.</p>

    <input id="email" type="email" placeholder="Email address" />

    <button onclick="register()">Create API Key</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    async function register() {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");

      msg.className = "msg";
      msg.innerText = "";

      if (!email) {
        msg.className = "msg error";
        msg.innerText = "Please enter your email.";
        return;
      }

      try {
        msg.innerText = "Creating your API key...";

        const res = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.className = "msg error";
          msg.innerText = data.error?.message || "Register failed.";
          return;
        }

        localStorage.setItem("api_key", data.api_key);
        localStorage.setItem("email", email);
        localStorage.setItem("balance", data.balance || 0);

        msg.className = "msg success";
        msg.innerText = "Success! Redirecting to dashboard...";

        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 1000);

      } catch (err) {
        msg.className = "msg error";
        msg.innerText = err.message;
      }
    }
  </script>

</body>
</html>
